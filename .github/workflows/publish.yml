# Publish porto-features to npm and PyPI. Builds run after validate; npm and PyPI publish run in parallel.
# Trigger: tag v* or manual dispatch only. No workflow_run (OR would run on every validation on main/PR).
# Builds and validates each artifact once; publish jobs use those artifacts (no rebuild).

name: publish to npm and pypi

# Tag push: main flow (merge to main → push tag v* → workflow runs once).
# workflow_dispatch: (1) run from any branch to test or re-publish; (2) use "Publish target" to run only npm or only pypi (e.g. re-publish PyPI after npm succeeded). Do not push a tag for the same version after a manual run (would trigger again and fail).
on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:
        inputs:
            publish_target:
                description: 'Publish target (tag push always runs both)'
                required: true
                default: both
                type: choice
                options:
                    - both
                    - npm
                    - pypi

env:
    NODE_VERSION: '20'
    NODE_VERSION_NPM: '22'
    PYTHON_VERSION: '3.13'

jobs:
    # -------------------------------------------------------------------------
    # Validate once (Python); both build jobs depend on this.
    # -------------------------------------------------------------------------
    validate:
        name: Validate porto-features and publishability
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -e ".[dev]"

            - name: Validate feature files
              run: python scripts/validate_features.py

            - name: Validate fixture files
              run: python scripts/validate_fixtures.py

            - name: Test publish (npm pack + PyPI wheel)
              run: ./tests/test_publish.sh

    # -------------------------------------------------------------------------
    # Build npm package; produce tarball artifact.
    # -------------------------------------------------------------------------
    npm_build:
        name: Build npm package
        runs-on: ubuntu-latest
        needs: [validate]
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.publish_target != 'pypi'
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  registry-url: 'https://registry.npmjs.org/'

            - name: Install dependencies
              run: npm install

            - name: Build package
              run: npm pack

            - name: Verify tarball contents
              run: |
                  tar -tzf gruncellka-porto-features-*.tgz | head -30
                  test -n "$(tar -tzf gruncellka-porto-features-*.tgz | grep 'package/porto_features/features/')"
                  test -n "$(tar -tzf gruncellka-porto-features-*.tgz | grep 'package/porto_features/fixtures/')"
                  echo "Tarball structure OK"

            - name: Upload npm artifact
              uses: actions/upload-artifact@v4
              with:
                  name: npm-package
                  path: gruncellka-porto-features-*.tgz

    # -------------------------------------------------------------------------
    # Build PyPI package; produce wheel + sdist artifacts.
    # -------------------------------------------------------------------------
    pypi_build:
        name: Build PyPI package
        runs-on: ubuntu-latest
        needs: [validate]
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.publish_target != 'npm'
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -e ".[dev]"
                  pip install build

            - name: Build package
              run: python3 -m build

            - name: Verify dist contents
              run: |
                  ls -la dist/
                  python3 -m zipfile -l dist/*.whl | head -40
                  echo "Dist structure OK"

            - name: Upload PyPI artifact
              uses: actions/upload-artifact@v4
              with:
                  name: pypi-package
                  path: dist/

    # -------------------------------------------------------------------------
    # Publish in parallel: npm and PyPI each depend only on their build (so manual "pypi only" runs only pypi_build + publish_pypi).
    # -------------------------------------------------------------------------
    publish_npm:
        name: Publish to npm
        runs-on: ubuntu-latest
        needs: [npm_build]
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.publish_target != 'pypi'
        permissions:
            contents: read
            id-token: write
            packages: write
        steps:
            - name: Download npm artifact
              uses: actions/download-artifact@v4
              with:
                  name: npm-package

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION_NPM }}

            - name: Install latest npm (required for OIDC trusted publishing)
              run: npm install -g npm@latest

            - name: Publish to npm
              run: npm publish --access public --provenance *.tgz

    publish_pypi:
        name: Publish to PyPI
        runs-on: ubuntu-latest
        needs: [pypi_build]
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.publish_target != 'npm'
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Download PyPI artifact
              uses: actions/download-artifact@v4
              with:
                  name: pypi-package
                  path: dist

            - name: Publish to PyPI (Trusted Publisher)
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  packages-dir: dist

    # -------------------------------------------------------------------------
    # Create GitHub Release only when both npm and PyPI publish succeeded.
    # -------------------------------------------------------------------------
    release:
        name: Create GitHub Release
        runs-on: ubuntu-latest
        needs: [publish_npm, publish_pypi]
        if: startsWith(github.ref, 'refs/tags/')
        permissions:
            contents: write
        steps:
            - name: Create GitHub Release
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: ${{ github.ref_name }}
                  name: Release ${{ github.ref_name }}
                  draft: false
                  prerelease: false
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
